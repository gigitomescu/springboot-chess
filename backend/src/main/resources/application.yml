server:
  port: 8080

spring:
  application:
    name: chess-app
  web:
    resources:
      add-mappings: true

# Stockfish engine configuration
stockfish:
  path: D:/apps/stockfish/stockfish-windows-x86-64-avx2.exe
  default-depth: 12
  timeout-seconds: 10
  skill-level: 0   # 0 = weakest (≈1100 ELO), 20 = full strength

# Active frontend: angular | react | none
frontend:
  active: angular
  cors:
    allowed-origins: http://localhost:4200,http://localhost:3000

logging:
  level:
    '[com.gdt.chess]': DEBUG
    root: INFO
