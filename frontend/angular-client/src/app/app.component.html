<div class="app-shell">
  <header class="app-header">
    <h1>♟ Chess App</h1>
    <div class="header-actions">
      <button class="primary" (click)="newGame()" [disabled]="loading">
        {{ loading ? 'Loading…' : 'New Game' }}
      </button>
    </div>
  </header>

  <main class="game-area">
    <!-- Board column -->
    <section class="board-section">
      <div class="status-bar" [class.game-over]="gameStatus !== 'IN_PROGRESS'">
        {{ statusMessage }}
      </div>

      <app-chess-board
        [fen]="currentFen"
        [playerColor]="'WHITE'"
        [disabled]="boardDisabled || gameStatus !== 'IN_PROGRESS'"
        (moveMade)="onMoveMade($event)"
      ></app-chess-board>

      <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
      </div>
    </section>

    <!-- Side panel -->
    <aside class="side-panel">
      <!-- Move history -->
      <div class="move-history">
        <h3>Move History</h3>
        <ol class="move-list">
          <li *ngFor="let move of moveHistory; let i = index">
            <span class="move-number" *ngIf="i % 2 === 0">{{ i / 2 + 1 }}.</span>
            {{ move }}
          </li>
        </ol>
      </div>

      <!-- Engine analysis -->
      <app-analysis-panel
        [fen]="currentFen"
        [autoAnalyze]="false"
      ></app-analysis-panel>
    </aside>
  </main>
</div>
