<div class="app-shell">
  <header class="app-header">
    <h1>♟ Chess App</h1>

    <div class="mode-selector">
      <label class="mode-toggle">
        <input type="checkbox" [(ngModel)]="vsEngine" />
        vs Engine
      </label>

      <ng-container *ngIf="vsEngine">
        <select class="mode-select" [(ngModel)]="playerColor">
          <option value="WHITE">Play White</option>
          <option value="BLACK">Play Black</option>
        </select>

        <select class="mode-select" [(ngModel)]="engineElo">
          <option *ngFor="let elo of eloOptions" [value]="elo">{{ elo }} ELO</option>
        </select>
      </ng-container>
    </div>

    <div class="header-actions">
      <button class="primary" (click)="newGame()" [disabled]="loading">
        {{ loading ? 'Loading…' : 'New Game' }}
      </button>
    </div>
  </header>

  <main class="game-area">
    <!-- Board column -->
    <section class="board-section">
      <div class="status-bar" [class.game-over]="gameStatus !== 'IN_PROGRESS'">
        {{ statusMessage }}
      </div>

      <div class="board-with-bar">
        <app-eval-bar
          [score]="evalScore"
          [isMate]="evalIsMate"
          [mateIn]="evalMateIn"
        ></app-eval-bar>

        <app-chess-board
          [fen]="currentFen"
          [playerColor]="myColor"
          [disabled]="boardDisabled || gameStatus !== 'IN_PROGRESS' || engineThinking"
          (moveMade)="onMoveMade($event)"
        ></app-chess-board>
      </div>

      <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
      </div>

      <div *ngIf="gameStatus === 'IN_PROGRESS' && !engineThinking" class="game-actions">
        <button class="btn-draw" (click)="offerDraw()">½ Offer Draw</button>
        <button class="btn-resign" (click)="resign()">⚑ Resign</button>
      </div>
    </section>

    <!-- Side panel -->
    <aside class="side-panel">
      <!-- Move history -->
      <div class="move-history">
        <h3>Move History</h3>
        <ol class="move-list">
          <li *ngFor="let move of moveHistory; let i = index">
            <span class="move-number" *ngIf="i % 2 === 0">{{ i / 2 + 1 }}.</span>
            {{ move }}
          </li>
        </ol>
      </div>

      <!-- Engine analysis -->
      <app-analysis-panel
        [fen]="currentFen"
        [autoAnalyze]="false"
      ></app-analysis-panel>
    </aside>
  </main>
</div>
